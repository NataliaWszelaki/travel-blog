<main>
    <section class="contact-section">
        <div class="contact-container">
            <div class="contact-form">
                <h2>Contact me</h2>
                <p>Need more information? Get in touch with me:</p>
                <form>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" size="50" required>
                    <label for="email">Email address:</label>
                    <input type="text" id="email" name="email" placeholder="example@example.com" size="50"
                           pattern=".+@.+" required>
                    <label for="subject">Subject:</label>
                    <select id="subject" name="subject" required>
                        <option value="Travel">Travel</option>
                        <option value="Cooperation">Cooperation</option>
                        <option value="Other">Other</option>
                    </select>
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" placeholder="Enter your message" rows="6" cols="100" required>
                    </textarea>
                    <button type="submit">Submit</button>
                </form>
            </div>
            <img src="images/img12.jpg" alt="Contact">
        </div>
    </section>
</main>
